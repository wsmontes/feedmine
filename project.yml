name: feedmine
options:
  bundleIdPrefix: com.feedmine
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
  TARGETED_DEVICE_FAMILY: "1"  # iPhone only

packages:
  FeedKit:
    url: https://github.com/nmdias/FeedKit
    from: 9.0.0

targets:
  feedmine:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: feedmine
      - path: feedmine/Resources/Feeds
        type: folder
    info:
      path: feedmine/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.feedmine.app
      TARGETED_DEVICE_FAMILY: "1"  # iPhone only
      DEVELOPMENT_TEAM: "BU5227WFYX"
    dependencies:
      - package: FeedKit

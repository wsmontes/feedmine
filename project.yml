name: feedmine
options:
  bundleIdPrefix: com.feedmine
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
  TARGETED_DEVICE_FAMILY: "1"  # iPhone only

packages:
  FeedKit:
    url: https://github.com/nmdias/FeedKit
    from: 9.0.0
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.4.0

targets:
  feedmine:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: feedmine
        excludes:
          - Resources/Feeds
      - path: feedmine/Resources/Feeds
        type: folder
    info:
      path: feedmine/Info.plist
      properties:
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsForMedia: true
        UIBackgroundModes:
          - audio
        CFBundleURLTypes:
          - CFBundleURLName: com.feedmine.app
            CFBundleURLSchemes:
              - feedmine
        CFBundleDocumentTypes:
          - CFBundleTypeName: "OPML File"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.xml
              - org.opml.opml
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleLocalizations:
          - ar
          - ca
          - zh-Hans
          - zh-Hant
          - hr
          - cs
          - da
          - nl
          - en
          - en-AU
          - en-GB
          - en-IN
          - fi
          - fr
          - fr-CA
          - de
          - el
          - he
          - hi
          - hu
          - id
          - it
          - ja
          - ko
          - ms
          - nb
          - pl
          - pt-BR
          - pt-PT
          - ro
          - ru
          - sk
          - es
          - es-419
          - sv
          - th
          - tr
          - uk
          - vi
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.feedmine.app
      TARGETED_DEVICE_FAMILY: "1"  # iPhone only
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: "955573A4YH"
    dependencies:
      - package: FeedKit
      - package: GRDB
  feedmineTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: feedmineTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.feedmine.app.tests
      TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: feedmine
schemes:
  feedmine:
    build:
      targets:
        feedmine: all
        feedmineTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - feedmineTests

name: feedmine
options:
  bundleIdPrefix: com.feedmine
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
  TARGETED_DEVICE_FAMILY: "1"  # iPhone only

packages:
  FeedKit:
    url: https://github.com/nmdias/FeedKit
    from: 9.0.0

targets:
  feedmine:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: feedmine
    info:
      path: feedmine/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.feedmine.app
      DEVELOPMENT_TEAM: ""
    dependencies:
      - package: FeedKit
